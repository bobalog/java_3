<style>
*{box-sizing:border-box;margin:0;padding:0}:root{--bg:#fff;--surface:#f8f9fa;--border:#e5e7eb;--border2:#d1d5db;--text:#111827;--muted:#6b7280;--light:#9ca3af;--accent:#2563eb;--accent-l:#eff6ff;--accent-m:#dbeafe;--green:#16a34a;--green-l:#f0fdf4;--green-m:#bbf7d0;--red:#dc2626;--red-l:#fef2f2;--red-m:#fecaca;--yellow:#d97706;--yellow-l:#fffbeb;--fn:'Noto Sans KR',sans-serif;--fm:'JetBrains Mono',monospace;--sh:0 1px 3px rgba(0,0,0,.08);--sh2:0 4px 12px rgba(0,0,0,.08)}
body{background:#fff;color:var(--text);font-family:var(--fn);min-height:100vh}.hd{background:#fff;border-bottom:2px solid var(--border);padding:0 1.25rem;display:flex;align-items:center;gap:.75rem;height:56px;position:sticky;top:0;z-index:200;box-shadow:var(--sh)}.logo{font-weight:900;font-size:1rem;color:var(--accent);white-space:nowrap}.logo span{color:var(--text)}
.mode-tabs{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:3px;margin-left:auto;gap:3px}.mt{padding:.3rem .62rem;border:none;background:transparent;color:var(--muted);cursor:pointer;font-family:var(--fn);font-size:.76rem;font-weight:500;border-radius:5px;transition:all .18s;white-space:nowrap}.mt.on{background:#fff;color:var(--accent);box-shadow:var(--sh);font-weight:700}
.chnav{background:#fff;border-bottom:1px solid var(--border);padding:.5rem 1.25rem;display:flex;gap:.35rem;flex-wrap:wrap;align-items:center}.chlabel{font-size:.72rem;color:var(--light);margin-right:.15rem}.chb{padding:.25rem .8rem;border:1.5px solid var(--border2);background:#fff;color:var(--muted);border-radius:2rem;cursor:pointer;font-family:var(--fn);font-size:.75rem;font-weight:600}.chb.on{border-color:var(--accent);color:var(--accent);background:var(--accent-l)}
main{max-width:900px;margin:0 auto;padding:1.25rem 1rem 4rem}.pg{display:none}.pg.on{display:block}.top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1rem;gap:.75rem;flex-wrap:wrap}.title{font-size:1rem;font-weight:800}.sub{font-size:.72rem;color:var(--accent);font-weight:700;background:var(--accent-l);padding:.2rem .6rem;border-radius:2rem;display:inline-block;margin-top:.25rem}.prog-wrap{flex:1;min-width:140px;max-width:260px}.prog-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:.25rem}.prog-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}.prog-txt{font-size:.7rem;color:var(--muted);font-family:var(--fm)}
.btns,.controls{display:flex;gap:.4rem;flex-wrap:wrap;justify-content:center}.fcb{padding:.36rem .8rem;border:1.5px solid var(--border2);background:#fff;color:var(--muted);border-radius:.45rem;cursor:pointer;font-size:.75rem;font-weight:600}.fcb:hover{border-color:var(--accent);color:var(--accent)}.fcb.pri{background:var(--accent);color:#fff;border-color:var(--accent)}.panel,.qcard{background:#fff;border:1.5px solid var(--border);border-radius:14px;box-shadow:var(--sh2);padding:1.15rem;margin-bottom:.75rem}.summary{font-size:.82rem;color:var(--muted);line-height:1.65;background:var(--surface);border:1px solid var(--border);border-radius:.8rem;padding:1rem;margin-bottom:1rem}
.cch{font-size:.7rem;color:var(--light);font-family:var(--fm);margin-bottom:.4rem}.qtext,.study-q{font-size:.93rem;line-height:1.75;font-weight:600}.blank{display:inline-block;min-width:52px;background:var(--accent-m);border-radius:3px;padding:0 .25rem;color:transparent;border-bottom:2px solid var(--accent);margin:0 .1rem}.study-a{margin-top:.65rem;font-size:.9rem;color:var(--green);font-weight:900;background:var(--green-l);border:1px solid var(--green-m);display:inline-block;padding:.35rem .7rem;border-radius:2rem}
.mcopts{display:flex;flex-direction:column;gap:.45rem;margin-top:.7rem}.mco{display:flex;align-items:flex-start;gap:.55rem;padding:.62rem .72rem;border:1.5px solid var(--border);border-radius:.55rem;cursor:pointer;transition:all .15s;background:#fff;user-select:none}.mco:hover{border-color:var(--accent-m);background:var(--accent-l)}.mco.ok2{border-color:var(--green)!important;background:var(--green-l)!important;color:var(--green)}.mco.ng2{border-color:var(--red)!important;background:var(--red-l)!important;color:var(--red)}.onum{font-family:var(--fm);font-size:.78rem;color:var(--light);flex:none;margin-top:.03rem;font-weight:800}.otext{font-size:.88rem;line-height:1.45;font-weight:600}
.scene{perspective:1100px;margin-bottom:1rem;cursor:pointer;user-select:none}.card3d{position:relative;width:100%;min-height:250px;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1)}.card3d.flip{transform:rotateY(180deg)}.face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:14px;border:1.5px solid var(--border);box-shadow:var(--sh2);padding:1.75rem;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;min-height:250px;background:#fff}.back{transform:rotateY(180deg)}.ctag{font-size:.65rem;font-weight:800;letter-spacing:.07em;text-transform:uppercase;padding:.2rem .6rem;border-radius:2rem;margin-bottom:.75rem;background:var(--accent-m);color:var(--accent)}.cq{font-size:1rem;font-weight:600;line-height:1.75;max-width:650px;word-break:keep-all}.flip-hint{font-size:.72rem;color:var(--light);margin-top:1rem}.ans-label{font-size:.68rem;font-weight:800;color:var(--green);letter-spacing:.05em;text-transform:uppercase;margin-bottom:.4rem}.ans-val{font-size:1.35rem;font-weight:900;color:var(--green);font-family:var(--fm)}.cnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:.85rem}.narr{padding:.45rem .9rem;border:1.5px solid var(--border2);background:#fff;color:var(--muted);border-radius:.45rem;cursor:pointer;font-size:.95rem;line-height:1}.ccount{font-size:.77rem;color:var(--muted);font-family:var(--fm)}
.typing-q{font-size:1rem;line-height:1.8;font-weight:650;background:var(--accent-l);border:1px solid var(--accent-m);padding:1rem;border-radius:.8rem;margin-bottom:1rem;word-break:keep-all}.typing-input{width:100%;font-size:1.1rem;font-family:var(--fm);font-weight:700;border:2px solid var(--border2);border-radius:.7rem;padding:.78rem 1rem;outline:none}.typing-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.12)}.feedback{margin-top:.8rem;font-size:.88rem;font-weight:800;min-height:1.5rem}.ok{color:var(--green)}.ng{color:var(--red)}.hint{color:var(--yellow)}.count-row{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.8rem}.badge{font-size:.72rem;font-weight:800;border-radius:2rem;padding:.32rem .7rem;background:var(--surface);border:1px solid var(--border);color:var(--muted)}.badge strong{color:var(--accent);font-family:var(--fm)}
</style></head>

<div id="pg-typing" class="pg"><main><div class="top"><div><div class="title" id="typeTitle"></div><div class="sub">빈칸 하나씩 분리 · 답만 쓰기</div></div><div class="prog-wrap"><div class="prog-bar"><div class="prog-fill" id="typeProg"></div></div><div class="prog-txt" id="typeProgTxt"></div></div><div class="btns"><button class="fcb" id="typeShuffle">🔀 셔플</button><button class="fcb pri" id="typeRestart">↺ 처음부터</button></div></div><div class="panel"><div class="cch" id="typeNo"></div><div class="typing-q" id="typeQ"></div><input class="typing-input" id="typeInput" placeholder="정답만 입력하고 Enter" autocomplete="off" autocorrect="off" spellcheck="false"><div class="feedback" id="typeFeedback"></div><div class="count-row"><span class="badge">성공 <strong id="typeSuccess">0</strong> / 5</span><span class="badge">정답 <strong id="typeHint">가림</strong></span></div><div class="controls"><button class="fcb" id="typePrev">← 이전</button><button class="fcb pri" id="typeCheck">채점하기</button><button class="fcb" id="typeNext">다음 →</button><button class="fcb" id="typeShow">정답보기</button></div></div></main></div>
<div id="pg-mc5" class="pg"><main><div class="top"><div><div class="title" id="mcTitle"></div><div class="sub">클릭 즉시 정답/오답 표시</div></div><div class="prog-wrap"><div class="prog-bar"><div class="prog-fill" id="mcProg"></div></div><div class="prog-txt" id="mcProgTxt"></div></div><div class="btns"><button class="fcb" id="mcShuffle">🔀 셔플</button><button class="fcb pri" id="mcRestart">↺ 처음부터</button></div></div><div class="panel"><div class="cch" id="mcNo"></div><div class="qtext" id="mcQ"></div><div class="mcopts" id="mcOpts"></div><div class="feedback" id="mcFeedback"></div><div class="count-row"><span class="badge">성공 <strong id="mcSuccess">0</strong> / 5</span><span class="badge">정답 <strong id="mcHint">가림</strong></span></div><div class="controls"><button class="fcb" id="mcPrev">← 이전</button><button class="fcb" id="mcNext">다음 →</button><button class="fcb" id="mcShow">정답보기</button></div></div></main></div>

function flashNext(){flashIdx=(flashIdx+1)%flashOrder.length;flashFlip=false;renderFlash()}function flashPrev(){flashIdx=(flashIdx-1+flashOrder.length)%flashOrder.length;flashFlip=false;renderFlash()}
$('scene').onclick=()=>{flashFlip=!flashFlip;renderFlash()};$('flashNext').onclick=flashNext;$('flashPrev').onclick=flashPrev;$('flashShuffle').onclick=()=>{shuffle(flashOrder);flashIdx=0;flashFlip=false;renderFlash()};$('flashRestart').onclick=()=>{flashOrder=B().map((_,i)=>i);flashIdx=0;flashFlip=false;renderFlash()}
function renderTyping(){ $('typeTitle').textContent=C().title+' — 빈칸 5회'; const item=B()[typeOrder[typeIdx]];$('typeNo').textContent=item[0];$('typeQ').innerHTML=paintBlank(item[1]);$('typeInput').value='';$('typeFeedback').textContent='';$('typeFeedback').className='feedback';$('typeSuccess').textContent=typeSuccess;$('typeHint').textContent='가림';progress('typeProg','typeProgTxt',typeIdx,typeOrder.length);setTimeout(()=>$('typeInput').focus(),50)}
function typeNext(){typeIdx=(typeIdx+1)%typeOrder.length;typeSuccess=0;renderTyping()}function typePrev(){typeIdx=(typeIdx-1+typeOrder.length)%typeOrder.length;typeSuccess=0;renderTyping()}
function checkTyping(){const item=B()[typeOrder[typeIdx]], val=$('typeInput').value;if(val===item[2]){typeSuccess++;$('typeSuccess').textContent=typeSuccess;$('typeFeedback').textContent='정답! '+typeSuccess+'/5 성공 ✨';$('typeFeedback').className='feedback ok';$('typeInput').value='';if(typeSuccess>=5){$('typeFeedback').textContent='5번 성공! 다음 빈칸으로 이동 💯';setTimeout(typeNext,450)}}else{typeSuccess=0;$('typeSuccess').textContent=0;$('typeFeedback').textContent='오답! 정답과 글자/띄어쓰기/괄호를 그대로 맞춰봐.';$('typeFeedback').className='feedback ng';$('typeInput').select()}}
$('typeCheck').onclick=checkTyping;$('typeNext').onclick=typeNext;$('typePrev').onclick=typePrev;$('typeShow').onclick=()=>{const item=B()[typeOrder[typeIdx]];$('typeHint').textContent=item[2];$('typeFeedback').textContent='정답 확인 완료!';$('typeFeedback').className='feedback hint';$('typeInput').focus()};$('typeShuffle').onclick=()=>{shuffle(typeOrder);typeIdx=0;typeSuccess=0;renderTyping()};$('typeRestart').onclick=()=>{typeOrder=B().map((_,i)=>i);typeIdx=0;typeSuccess=0;renderTyping()}
function renderMC(){ $('mcTitle').textContent=C().title+' — 객관식 5회'; const item=M()[mcOrder[mcIdx]];$('mcNo').textContent=item[0];$('mcQ').textContent=item[1];$('mcOpts').innerHTML='';item[2].forEach((op,i)=>{const d=document.createElement('div');d.className='mco';d.dataset.num=i+1;d.innerHTML='<span class="onum">'+nums[i]+'</span><span class="otext">'+esc(op)+'</span>';d.onclick=()=>checkMC(i+1,d);$('mcOpts').appendChild(d)});$('mcFeedback').textContent='';$('mcFeedback').className='feedback';$('mcSuccess').textContent=mcSuccess;$('mcHint').textContent='가림';progress('mcProg','mcProgTxt',mcIdx,mcOrder.length)}
function mcNext(){mcIdx=(mcIdx+1)%mcOrder.length;mcSuccess=0;renderMC()}function mcPrev(){mcIdx=(mcIdx-1+mcOrder.length)%mcOrder.length;mcSuccess=0;renderMC()}
function checkMC(num,el){const item=M()[mcOrder[mcIdx]];document.querySelectorAll('#mcOpts .mco').forEach(o=>o.classList.remove('ok2','ng2'));if(item[3].includes(num)){el.classList.add('ok2');mcSuccess++;$('mcSuccess').textContent=mcSuccess;$('mcFeedback').textContent='정답! '+mcSuccess+'/5 성공 ✨';$('mcFeedback').className='feedback ok';if(mcSuccess>=5){$('mcFeedback').textContent='5번 성공! 다음 객관식으로 이동 💯';setTimeout(mcNext,450)}}else{el.classList.add('ng2');item[3].forEach(n=>{const t=document.querySelector('#mcOpts .mco[data-num="'+n+'"]');if(t)t.classList.add('ok2')});mcSuccess=0;$('mcSuccess').textContent=0;$('mcFeedback').textContent='오답! 정답은 '+ansText(item[3])+' 이야.';$('mcFeedback').className='feedback ng'}}
$('mcNext').onclick=mcNext;$('mcPrev').onclick=mcPrev;$('mcShow').onclick=()=>{const item=M()[mcOrder[mcIdx]];$('mcHint').textContent=ansText(item[3]);$('mcFeedback').textContent='정답 확인 완료!';$('mcFeedback').className='feedback hint'};$('mcShuffle').onclick=()=>{shuffle(mcOrder);mcIdx=0;mcSuccess=0;renderMC()};$('mcRestart').onclick=()=>{mcOrder=M().map((_,i)=>i);mcIdx=0;mcSuccess=0;renderMC()}
document.addEventListener('keydown',e=>{const isInput=document.activeElement&&document.activeElement.id==='typeInput';if(isInput){if(e.key==='Enter'){e.preventDefault();checkTyping();return}if(e.ctrlKey&&e.key==='ArrowRight'){e.preventDefault();typeNext();return}if(e.ctrlKey&&e.key==='ArrowLeft'){e.preventDefault();typePrev();return}return}if(mode==='flash'){if(e.code==='Space'){e.preventDefault();flashFlip=!flashFlip;renderFlash()}if(e.key==='ArrowRight')flashNext();if(e.key==='ArrowLeft')flashPrev()}else if(mode==='mc5'){if(e.key>='1'&&e.key<='5'){const opt=document.querySelector('#mcOpts .mco[data-num="'+e.key+'"]');if(opt)opt.click()}if(e.key==='ArrowRight')mcNext();if(e.key==='ArrowLeft')mcPrev()}})
function renderAll(){renderStudy();renderFlash();renderTyping();renderMC()}chapterBtns();initChapter();
</script></body></html>
